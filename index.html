<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVIL CEO Payment Gateway</title>
    <style>
        :root {
            --bkash: #d12053;
            --nagad: #f7941d;
            --rocket: #8c3494;
            --upay: #25408f;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f6f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            width: 360px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }
        .step { display: none; padding: 25px; text-align: center; }
        .step.active { display: block; }

        /* Step 1: Amount Input */
        .header-logo {
            width: 80px; height: 80px; background: #eee;
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px; color: #555;
        }
        h2 { margin: 10px 0; font-size: 18px; color: #333; }
        input[type="number"] {
            width: 100%; padding: 12px; margin: 20px 0;
            border: 2px solid #ddd; border-radius: 8px;
            font-size: 18px; text-align: center; box-sizing: border-box;
        }
        .next-btn {
            background: #007bff; color: white; border: none;
            width: 100%; padding: 12px; border-radius: 8px;
            cursor: pointer; font-weight: bold;
        }

        /* Step 2: Method Selection */
        .method-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;
        }
        .method-card {
            border: 1px solid #eee; padding: 15px; border-radius: 10px;
            cursor: pointer; transition: 0.2s;
        }
        .method-card:hover { border-color: #007bff; background: #f0f7ff; }
        .method-card img { height: 35px; }

        /* Step 3: Send Money Page */
        .instruction-box { color: white; border-radius: 10px; padding: 20px; text-align: left; }
        .instruction-item { margin-bottom: 8px; font-size: 13px; }
        .trx-input {
            width: 100%; padding: 10px; margin: 15px 0;
            border: none; border-radius: 5px; text-align: center;
        }
        .copy-btn {
            background: #fff; color: #333; border: none;
            padding: 2px 8px; border-radius: 4px; font-size: 11px;
            cursor: pointer; margin-left: 5px; font-weight: bold;
        }
        .verify-btn {
            width: 100%; padding: 12px; border: 1px solid white;
            background: transparent; color: white; border-radius: 8px;
            margin-top: 10px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <div class="header-logo">DEV</div>
        <h2>DEVIL CEO</h2>
        <p style="color: #666; font-size: 14px;">টাকার পরিমাণ লিখুন</p>
        <input type="number" id="amountInput" placeholder="0.00" min="10">
        <button class="next-btn" onclick="goToStep2()">পরবর্তী ধাপ</button>
    </div>

    <div id="step2" class="step">
        <button onclick="goToStep1()" style="float: left; border: none; background: none; cursor: pointer;">‹ Back</button>
        <h2>পেমেন্ট পদ্ধতি বেছে নিন</h2>
        <div class="method-grid">
            <div class="method-card" onclick="goToStep3('bkash')">
                <img src="https://www.logo.wine/a/logo/BKash/BKash-Logo.wine.svg" alt="bKash">
            </div>
            <div class="method-card" onclick="goToStep3('nagad')">
                <img src="https://www.logo.wine/a/logo/Nagad/Nagad-Logo.wine.svg" alt="Nagad">
            </div>
            <div class="method-card" onclick="goToStep3('rocket')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Rocket_logo.svg/1280px-Rocket_logo.svg.png" alt="Rocket">
            </div>
            <div class="method-card" onclick="goToStep3('upay')">
                <img src="https://itshisab.com/wp-content/uploads/2021/08/upay-logo.png" alt="Upay" style="height: 25px;">
            </div>
        </div>
    </div>

    <div id="step3" class="step">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button onclick="goToStep2()" style="border: none; background: none; cursor: pointer;">‹ Back</button>
            <img id="finalLogo" src="" alt="Logo" style="height: 30px;">
            <span></span>
        </div>
        
        <div id="instructionBg" class="instruction-box">
            <p style="text-align: center; font-weight: bold; margin-top: 0;">ট্রানজেকশন আইডি দিন</p>
            <input type="text" class="trx-input" placeholder="TrxID এখানে দিন">
            
            <div class="instruction-item">• <span id="ussdCode">*247#</span> ডায়াল করুন অথবা অ্যাপে যান।</div>
            <div class="instruction-item">• <b>"Send Money"</b> অপশন সিলেক্ট করুন।</div>
            <div class="instruction-item">• নম্বর: <b>01717724407</b> <button class="copy-btn" onclick="copyNum()">Copy</button></div>
            <div class="instruction-item">• পরিমাণ: <b id="finalAmount">0</b> BDT</div>
            <div class="instruction-item">• পেমেন্ট শেষে <b>Transaction ID</b> ইনপুট দিন।</div>
            
            <button class="verify-btn">VERIFY পেমেন্ট</button>
        </div>
    </div>
</div>

<script>
    let selectedAmount = 0;

    function goToStep1() {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step1').classList.add('active');
    }

    function goToStep2() {
        const val = document.getElementById('amountInput').value;
        if(val < 10) { alert("কমপক্ষে ১০ টাকা লিখুন"); return; }
        selectedAmount = val;
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step2').classList.add('active');
    }

    function goToStep3(method) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step3').classList.add('active');
        
        document.getElementById('finalAmount').innerText = selectedAmount;
        const bg = document.getElementById('instructionBg');
        const logo = document.getElementById('finalLogo');
        const ussd = document.getElementById('ussdCode');

        if(method === 'bkash') {
            bg.style.backgroundColor = '#d12053';
            logo.src = 'https://www.logo.wine/a/logo/BKash/BKash-Logo.wine.svg';
            ussd.innerText = '*247#';
        } else if(method === 'nagad') {
            bg.style.backgroundColor = '#f7941d';
            logo.src = 'https://www.logo.wine/a/logo/Nagad/Nagad-Logo.wine.svg';
            ussd.innerText = '*167#';
        } else if(method === 'rocket') {
            bg.style.backgroundColor = '#8c3494';
            logo.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Rocket_logo.svg/1280px-Rocket_logo.svg.png';
            ussd.innerText = '*322#';
        } else if(method === 'upay') {
            bg.style.backgroundColor = '#25408f';
            logo.src = 'https://itshisab.com/wp-content/uploads/2021/08/upay-logo.png';
            ussd.innerText = '*268#';
        }
    }

    function copyNum() {
        navigator.clipboard.writeText("01717724407");
        alert("নম্বর কপি হয়েছে!");
    }
</script>

</body>
</html>
